<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大阪府 防除指針ガイド</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@700&family=Noto+Sans+JP:wght@400;500;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--soil:#3d2b1f;--bark:#6b4226;--clay:#9e6b3f;--cream:#f5f0e6;--blue:#2c5f8a;--sky:#d4e9f7;--card:#fdfaf4;--bdr:#e0d4be;--straw:#c9a96e;}
body{font-family:'Noto Sans JP',sans-serif}
#cover{min-height:100vh;background:linear-gradient(160deg,#2a5c2a 0%,#3d7a3d 50%,#5a9e5a 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.c-box{position:relative;text-align:center;padding:40px;width:100%;max-width:480px}
.c-eyebrow{font-size:11px;font-weight:500;color:rgba(255,255,255,.45);letter-spacing:3px;text-transform:uppercase;margin-bottom:20px;}
.c-title{font-family:'Noto Serif JP',serif;font-size:32px;font-weight:700;color:#fff;line-height:1.6;margin-bottom:56px;}
.c-btn{display:inline-flex;align-items:center;gap:10px;background:#fff;color:#2d5a2d;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;padding:14px 36px;border-radius:40px;border:none;cursor:pointer;letter-spacing:1px;box-shadow:0 6px 24px rgba(0,0,0,.2);transition:all .3s;}
.c-btn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(0,0,0,.25)}
#app{display:none;min-height:100vh;background:#f0ebe0}
.a-header{background:linear-gradient(135deg,var(--soil),var(--bark));color:var(--cream);position:sticky;top:0;z-index:100;box-shadow:0 4px 20px rgba(61,43,31,.4);}
.a-top{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px}
.a-title{font-family:'Noto Serif JP',serif;font-size:18px;font-weight:700;color:var(--cream)}
.a-sub{font-size:11px;color:var(--straw);opacity:.8}
.a-back{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:var(--cream);padding:6px 12px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;}
.crop-tabs{display:flex;gap:6px;padding:8px 16px 14px;overflow-x:auto;scrollbar-width:none}
.crop-tabs::-webkit-scrollbar{display:none}
.ctab{flex-shrink:0;padding:7px 16px;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:20px;color:rgba(255,255,255,.75);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;}
.ctab.on{background:rgba(255,255,255,.92);color:var(--bark);font-weight:600;border-color:transparent;box-shadow:0 2px 12px rgba(0,0,0,.2)}
.a-body{max-width:900px;margin:0 auto;padding:20px 16px 40px}
.def-box{background:var(--sky);border-left:4px solid var(--blue);border-radius:0 10px 10px 0;padding:12px 16px;margin-bottom:20px;font-size:13px;color:#2c4a6e;line-height:1.7;}
.s-card{background:var(--card);border-radius:14px;border:1px solid var(--bdr);padding:20px;box-shadow:0 2px 12px rgba(61,43,31,.07);}
.s-title{font-size:13px;font-weight:700;color:#7a6050;text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px}
.mgrid{display:grid;grid-template-columns:repeat(12,1fr);gap:4px}
.mc{aspect-ratio:1;border-radius:6px;border:1.5px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;cursor:pointer;color:#aaa;background:#fff;user-select:none;transition:all .2s;}
.mc.on{background:var(--bark);border-color:var(--bark);color:#fff}
.mc:hover:not(.on){border-color:var(--clay);color:var(--clay)}
.r-count{font-size:12px;color:#9a8070;margin:16px 0 10px;min-height:18px}
.rcard{background:var(--card);border-radius:12px;border:1px solid var(--bdr);overflow:hidden;margin-bottom:12px;box-shadow:0 2px 10px rgba(61,43,31,.06);}
.rhead{display:flex;align-items:center;gap:8px;padding:14px 16px;cursor:pointer;}
.badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:12px;flex-shrink:0}
.bd{background:#fde8e5;color:#c0392b}
.bp{background:#e8f5e4;color:#2e7d32}
.rname{font-size:15px;font-weight:600;color:var(--soil);flex:1}
.spills{display:flex;gap:2px;flex-wrap:wrap}
.sp{font-size:9px;font-weight:600;padding:2px 5px;border-radius:4px;background:#f0e8d8;color:var(--clay)}
.sp.hit{background:var(--bark);color:#fff}
.chev{color:#b0a090;font-size:12px;transition:transform .3s;flex-shrink:0}
.rcard.open .chev{transform:rotate(180deg)}
.rbody{display:none;padding:0 16px 16px;border-top:1px solid var(--bdr)}
.rcard.open .rbody{display:block}
.vpills{display:flex;gap:6px;flex-wrap:wrap;padding-top:12px;margin-bottom:4px}
.vp{font-size:11px;padding:3px 10px;border-radius:12px;background:#f5f0e6;border:1px solid var(--bdr);color:#7a6050}
.nsec{padding:10px 0 6px}
.slabel{font-size:11px;font-weight:700;color:#9a8070;text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.ni{display:flex;gap:8px;font-size:12px;color:#5a4a3a;line-height:1.7;margin-bottom:4px}
.ni::before{content:"※";color:var(--clay);flex-shrink:0}
.psec{margin-top:10px}
.ptitle{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700;margin-bottom:8px;padding:6px 10px;border-radius:6px}
.prev{background:#e8f0fa;color:#2c5f8a}
.pact{background:#fff3e0;color:#e65100}
.pitem{background:#fff;border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;margin-bottom:6px;display:grid;grid-template-columns:1fr auto;gap:3px;}
.pname{font-size:13px;font-weight:600;color:var(--soil)}
.ptimes{font-size:11px;font-weight:600;color:#fff;background:var(--clay);padding:2px 7px;border-radius:10px;grid-row:1/span 2;align-self:center;white-space:nowrap;}
.ptimes.ul{background:#9a8070}
.pdet{font-size:11px;color:#8a7060;line-height:1.5}
.nopest{font-size:12px;color:#9a8070;padding:8px 0}
.psrch{display:inline-flex;align-items:center;justify-content:center;margin-left:6px;font-size:11px;text-decoration:none;background:#f0e8d8;border:1px solid var(--bdr);border-radius:6px;padding:1px 5px;vertical-align:middle;line-height:1;transition:background .2s;}
.psrch:hover{background:var(--straw);}
@media(max-width:480px){.c-title{font-size:26px}.a-body{padding:16px 12px 40px}.mc{font-size:9px}}

</style>
</head>
<body>

<div id="cover">
  <div class="c-box">
    <div class="c-eyebrow">大阪府 防除指針</div>
    <div class="c-title">農薬・防除情報<br>検索ツール</div>
    <button class="c-btn" onclick="enterApp()">🌿 ガイドを開く →</button>
  </div>
</div>

<div id="app">

    <div class="a-top">
      <div>
        <div class="a-title">🌿 大阪府 防除指針</div>

    <div class="s-card">

      <div class="mgrid" id="mgrid"></div>
      <div class="r-count" id="r-count"></div>
      <div id="results"></div>

  </div>
</div>

         {name:"ダニトロンフロアブル",d:"1000～2000倍",t:"3日前",n:1},
         {name:"ニッソラン水和剤",d:"2000～3000倍",t:"前日",n:2},
         {name:"マイトコーネフロアブル",d:"1000倍",t:"前日",n:1},
         {name:"サンクリスタル乳剤",d:"600倍",t:"前日",n:0},
         {name:"ダニコングフロアブル",d:"2000倍",t:"前日",n:1}
       ]},
      {name:"イチジクモンサビダニ", seasons:[6,7,8],
       notes:["発生期（6～7月）に散布する"],
       preventive:[],
       active:[
         {name:"ダニトロンフロアブル",d:"2000倍",t:"3日前",n:1},
         {name:"サンマイト水和剤",d:"1000～1500倍",t:"45日前",n:1},
         {name:"ピラニカ水和剤",d:"2000倍",t:"7日前",n:1}
       ]},
      {name:"ネコブセンチュウ", seasons:[3,4],
       notes:["根にこぶが発生し樹勢衰弱を認めたら3月下旬に樹冠下処理する","粒剤散布後に軽く土壌混和すると効果が高い"],
       preventive:[],
       active:[
         {name:"ネマトリンエース粒剤",d:"20kg/10a",t:"60日前",n:1}
       ]}
    ]
  }

  // 野菜追加: { id, na
  // 野菜追加: { id, name, emoji, definition(省略可), diseases:[...], pests:[...] }
];

var MN = ["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];
var cropId = CROPS[0].id;
var selMonths = [];

function getCrop(){
  for(var i=0;i<CROPS.length;i++) if(CROPS[i].id===cropId) return CROPS[i];
}
function enterApp(){
  document.getElementById("cover").style.display="none";
  document.getElementById("app").style.display="block";
}
function goBack(){
  document.getElementById("cover").style.display="flex";
  document.getElementById("app").style.display="none";
}
function init(){
  var tabs=document.getElementById("crop-tabs");
  tabs.innerHTML="";
  for(var i=0;i<CROPS.length;i++){
    (function(c){
      var btn=document.createElement("button");
      btn.className="ctab"+(c.id===cropId?" on":"");
      btn.textContent=c.emoji+" "+c.name;
      btn.onclick=function(){
        cropId=c.id;
        document.querySelectorAll(".ctab").forEach(function(b){b.classList.remove("on");});
        btn.classList.add("on");
        selMonths=[];
        buildGrid();
        renderDef();
        document.getElementById("r-count").textContent="";
        document.getElementById("results").innerHTML="";
      };
      tabs.appendChild(btn);
    })(CROPS[i]);
  }
  buildGrid();
  renderDef();
}
function renderDef(){
  var c=getCrop();
  var el=document.getElementById("def-area");
  el.innerHTML="";
  if(c.definition){
    var d=document.createElement("div");
    d.className="def-box";
    d.innerHTML="<strong>"+c.name+"について：</strong>"+c.definition;
    el.appendChild(d);
  }
}
function buildGrid(){
  var grid=document.getElementById("mgrid");
  grid.innerHTML="";
  for(var i=0;i<12;i++){
    (function(m,label){
      var div=document.createElement("div");
      div.className="mc"+(selMonths.indexOf(m)!==-1?" on":"");
      div.textContent=label;
      div.onclick=function(){
        var idx=selMonths.indexOf(m);
        if(idx===-1) selMonths.push(m); else selMonths.splice(idx,1);
        buildGrid();
        renderResults();
      };
      grid.appendChild(div);
    })(i+1, MN[i]);
  }
}
function renderResults(){
  var rc=document.getElementById("r-count");
  var re=document.getElementById("results");
  if(!selMonths.length){rc.textContent="";re.innerHTML="";return;}
  var crop=getCrop();
  var all=[];
  var i;
  for(i=0;i<crop.diseases.length;i++) all.push({item:crop.diseases[i],type:"d"});
  for(i=0;i<crop.pests.length;i++) all.push({item:crop.pests[i],type:"p"});
  var hit=[];
  for(i=0;i<all.length;i++){
    var seas=all[i].item.seasons;
    for(var j=0;j<selMonths.length;j++){
      if(seas.indexOf(selMonths[j])!==-1){hit.push(all[i]);break;}
    }
  }
  var sorted=selMonths.slice().sort(function(a,b){return a-b;});
  var lab=sorted.map(function(m){return MN[m-1];}).join("・");
  rc.textContent=hit.length>0?lab+"に発生する病害虫："+hit.length+"件":lab+"に該当する病害虫はありません";
  re.innerHTML="";
  for(i=0;i<hit.length;i++) re.appendChild(buildCard(hit[i].item,hit[i].type));
}
function buildCard(item,type){
  var isD=type==="d";
  var i,k;
  var card=document.createElement("div");
  card.className="rcard";
  card.onclick=function(){this.classList.toggle("open");};

  var head=document.createElement("div");
  head.className="rhead";

  var badge=document.createElement("span");
  badge.className="badge "+(isD?"bd":"bp");
  badge.textContent=isD?"病害":"害虫";
  head.appendChild(badge);

  var rname=document.createElement("span");
  rname.className="rname";
  rname.textContent=item.name;
  head.appendChild(rname);

  var spills=document.createElement("div");
  spills.className="spills";
  for(i=0;i<12;i++){
    var m=i+1;
    if(item.seasons.indexOf(m)!==-1){
      var sp=document.createElement("span");
      sp.className="sp"+(selMonths.indexOf(m)!==-1?" hit":"");
      sp.textContent=MN[i];
      spills.appendChild(sp);
    }
  }
  head.appendChild(spills);

  var chev=document.createElement("span");
  chev.className="chev";
  chev.textContent="▼";
  head.appendChild(chev);
  card.appendChild(head);

  var body=document.createElement("div");
  body.className="rbody";

  if(item.varieties&&item.varieties.length){
    var vpills=document.createElement("div");
    vpills.className="vpills";
    for(i=0;i<item.varieties.length;i++){
      var vp=document.createElement("span");
      vp.className="vp";
      vp.textContent="📌 "+item.varieties[i];
      vpills.appendChild(vp);
    }
    body.appendChild(vpills);
  }

  if(item.notes&&item.notes.length){
    var nsec=document.createElement("div");
    nsec.className="nsec";
    var sl=document.createElement("div");
    sl.className="slabel";
    sl.textContent="防除のポイント";
    nsec.appendChild(sl);
    for(i=0;i<item.notes.length;i++){
      var ni=document.createElement("div");
      ni.className="ni";
      ni.textContent=item.notes[i];
      nsec.appendChild(ni);
    }
    body.appendChild(nsec);
  }

  function addBlock(list,cls,lab){
    if(!list||!list.length) return;
    var psec=document.createElement("div");
    psec.className="psec";
    var pt=document.createElement("div");
    pt.className="ptitle "+cls;
    pt.textContent=lab;
    psec.appendChild(pt);
    for(k=0;k<list.length;k++){
      var p=list[k];
      var pitem=document.createElement("div");
      pitem.className="pitem";
      var pname=document.createElement("div");
      pname.className="pname";
      pname.textContent=p.name;
      var psrch=document.createElement("a");
      psrch.className="psrch";
      psrch.textContent="🔍";
      psrch.title="農水省で検索";
      psrch.href="https://www.google.com/search?q="+encodeURIComponent(p.name+" site:pesticide.maff.go.jp");
      psrch.target="_blank";
      psrch.rel="noopener noreferrer";
      psrch.onclick=function(e){e.stopPropagation()};
      pname.appendChild(psrch);
      pitem.appendChild(pname);
      var ptimes=document.createElement("div");
      ptimes.className="ptimes"+(p.n===0?" ul":"");
      ptimes.textContent=p.n===0?"回数制限なし":p.n+"回以内";
      pitem.appendChild(ptimes);
      var pdet=document.createElement("div");
      pdet.className="pdet";
      pdet.textContent="希釈："+p.d+"　収穫前日数："+p.t;
      pitem.appendChild(pdet);
      psec.appendChild(pitem);
    }
    body.appendChild(psec);
  }

  addBlock(item.preventive,"prev","🔵 予防散布");
  addBlock(item.active,"pact","🟠 発生時散布");

  if((!item.preventive||!item.preventive.length)&&(!item.active||!item.active.length)){
    var np=document.createElement("div");
    np.className="nopest";
    np.textContent="登録農薬なし（耕種的防除・予防管理が中心）";
    body.appendChild(np);
  }

  card.appendChild(body);
  return card;
}
init();

</script>
</body>
</html>
